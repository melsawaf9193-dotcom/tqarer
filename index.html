<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>مقارنة شاملة بين التقريرين</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }
h2 { text-align: center; }
body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  direction: rtl;
  padding: 40px 20px;
  color: #fff;
  background:
    linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
    url("https://raw.githubusercontent.com/xhhp1/mechanics/main/images/mechan.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
}

.container {
  display: flex;
  gap: 40px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 1500px;
  margin: auto;
}

.box {
  flex: 0 1 600px;
  min-width: 550px;
  padding: 30px;
  border-radius: 18px;
  background: rgba(30, 41, 59, 0.85);
  backdrop-filter: blur(6px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  transition: 0.3s ease;
}

.box:hover { transform: translateY(-5px); }

textarea {
  width: 100%;
  height: 550px;
  padding: 18px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  resize: none;
  font-family: 'Cairo', sans-serif;
  background: rgba(15, 23, 42, 0.9);
  color: #fff;
  transition: 0.3s;
}

textarea:focus {
  outline: none;
  border-color: #38bdf8;
  box-shadow: 0 0 10px rgba(56,189,248,0.4);
}

button {
  display: block;
  margin: 40px auto;
  padding: 15px 45px;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
  background: linear-gradient(90deg,#38bdf8,#6366f1);
  color: white;
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  transition: 0.3s ease;
}

button:hover { transform: scale(1.05); }

.box h3 { text-align: center; }

.result {
  margin: 40px auto 0;
  padding: 25px;
  border-radius: 18px;
  background: rgba(30, 41, 59, 0.85);
  backdrop-filter: blur(6px);
  max-width: 1200px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.missing {
  background: rgba(239,68,68,0.15);
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  color: #ff6b6b;
  font-weight: bold;
}

hr {
  border: none;
  border-top: 1px solid rgba(255,255,255,0.1);
  margin: 15px 0;
}
</style>
</head>

<body>

<h2>📊 متابعة السجلات (تقارير العمليات - تقارير الاشراف)</h2>

<div class="container">
  <div class="box">
    <h3>تقرير الإشراف</h3>
    <textarea id="supervision"></textarea>
  </div>

  <div class="box">
    <h3>تقرير العمليات</h3>
    <textarea id="operations"></textarea>
  </div>
</div>

<button onclick="compare()">قارن الآن</button>

<div class="result" id="result"></div>

<script>

/* ===== API USERS ===== */
let usersMap = {};

fetch("https://mechanic-backend.vercel.app/api/users")
.then(res => res.json())
.then(data => {
  const users = Array.isArray(data) ? data : (data.users || data.data || []);
  users.forEach(user => {
    if(user.discord){
      usersMap[String(user.discord)] = {
          nickname: user.nickname || "",
          code: user.code || ""
      };
    }
  });
});

/* ===== HELPERS ===== */
function getDiscordId(mention){
  return mention.replace(/[<@!>]/g,"");
}

function formatUser(id){
  const cleanId = getDiscordId(id);
  const user = usersMap[cleanId];
  return user ? `${user.nickname} (${id})` : id;
}

function clean(text){
  return text
    .replace(/\*\*/g,"")
    .replace(/ـ+/g,"")
    .replace(/\[.*?\]\(.*?\)/g,"");
}

function normalizeLabel(label){
  if(!label) return "";
  label = label
    .replace(/[إأآا]/g, "ا")
    .replace(/ى/g, "ي")
    .replace(/ة/g, "ه")
    .replace(/[()]/g, "")
    .replace(/\s+/g, " ")
    .trim();

  const map = {
    "قياده الكراج": "القياده", "قيادة الكراج": "القياده", "قياده": "القياده", "قيادة": "القياده",
    "المشرف العام": "اشراف عام", "اشراف عام": "اشراف عام",
    "المشرف الميداني": "اشراف ميداني", "اشراف ميداني": "اشراف ميداني",
    "مشرفين المناطق": "اشراف المناطق", "مشرف المناطق": "اشراف المناطق", "مشرف المنطقة": "اشراف المناطق", "اشراف المناطق": "اشراف المناطق",
    "السيدات و المعتمدين": "المعتمدين", "السيدات والمعتمدين": "المعتمدين", "لاعب معتمد": "المعتمدين",
    "العمليات": "العمليات", "نائب العمليات": "نائب العمليات",
    "مركز الاتصالات": "مركز الاتصالات",
    "فني ميناء لوس": "ميناء لوس", "ميناء لوس": "ميناء لوس",
    "فني ميناء بوليتو": "ميناء بوليتو", "ميناء بوليتو": "ميناء بوليتو",
    "البحث والانقاذ": "البحث والانقاذ", "البحث والإنقاذ": "البحث والانقاذ"
  };
  return map[label] || label;
}

/* ===== ANALYSIS FUNCTIONS ===== */

function extractSections(text){
  const sections = {};
  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  let currentNormalized = null;
  let currentOriginal = null;

  for (let line of lines) {
    let m = line.match(/^(.+?)\s*:\s*(.*)$/) || line.match(/^(.+?)\s*\(\s*(.*?)\s*\)\s*$/);
    if (m && !line.startsWith("<@")) {
      currentOriginal = m[1].trim();
      currentNormalized = normalizeLabel(currentOriginal);
      const idsInline = (m[2] || "").match(/<@!?\d+>/g) || [];
      for (const id of idsInline) add(id, currentNormalized, currentOriginal);
      continue;
    }
    if (currentNormalized) {
      const ids = line.match(/<@!?\d+>/g) || [];
      for (const id of ids) add(id, currentNormalized, currentOriginal);
    }
  }

  function add(id, normalized, original){
    if (!sections[id]) sections[id] = new Map();
    if (!sections[id].has(normalized)) sections[id].set(normalized, new Set());
    sections[id].get(normalized).add(original);
  }

  const out = {};
  for (const id in sections) {
    out[id] = {};
    for (const [norm, originalsSet] of sections[id].entries()) {
      out[id][norm] = [...originalsSet];
    }
  }
  return out;
}

function checkCodes(text) {
  const lines = text.split("\n").map(l => l.trim());
  let currentSection = "";
  let issues = [];
  lines.forEach(line => {
    if (line.includes(":")) { currentSection = line.replace(":", "").trim(); return; }
    if (/^[A-Za-z]\s*-\s*\d+/.test(line)) {
      const first = line.replace(/\s+/g, "")[0].toLowerCase();
      if (first !== "g") issues.push({ section: currentSection, code: line });
    }
  });
  return issues;
}

function findDuplicateCodesBySection(text) {
  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
  let currentSection = "";
  const codeMap = {};
  const duplicates = [];
  lines.forEach(line => {
    if (line.includes(":")) { currentSection = normalizeLabel(line.replace(":", "").trim()); return; }
    const match = line.match(/^[A-Za-z]\s*-\s*\d+/);
    if (match) {
      const code = match[0].replace(/\s+/g, "").toLowerCase();
      if (!codeMap[code]) codeMap[code] = {};
      if (!codeMap[code][currentSection]) codeMap[code][currentSection] = 0;
      codeMap[code][currentSection]++;
    }
  });
  for (const code in codeMap) {
    const sections = Object.keys(codeMap[code]);
    sections.forEach(sec => {
      if (codeMap[code][sec] > 1) duplicates.push({ code, section: sec, count: codeMap[code][sec], type: "داخل نفس القسم" });
    });
    if (sections.length > 1) duplicates.push({ code, sections, type: "بين الأقسام" });
  }
  return duplicates;
}

function checkPortUserCodes(text) {
    const lines = text.split("\n");
    const reportCodes = (text.match(/G-\d+/gi) || []).map(c => c.toUpperCase().replace(/\s/g, ''));
    let portIssues = [];

    lines.forEach(line => {
        if(line.includes("ميناء لوس") || line.includes("ميناء بوليتو")) {
            const mentions = line.match(/<@!?\d+>/g);
            if(mentions) {
                mentions.forEach(m => {
                    const id = getDiscordId(m);
                    const user = usersMap[id];
                    if(user && user.code) {
                        const cleanUserCode = user.code.toUpperCase().replace(/\s/g, '');
                        if(!reportCodes.includes(cleanUserCode)) {
                            portIssues.push(`فني الميناء **${user.nickname}** الذي كوده **${user.code}** مكتوب في الميناء لكن كوده مش مكتوب تحت.`);
                        }
                    }
                });
            }
        }
    });
    return portIssues;
}

/* ===== MAIN COMPARE FUNCTION ===== */

function compare(){
  const opsRaw = document.getElementById("operations").value;
  const supRaw = document.getElementById("supervision").value;
  const result = document.getElementById("result");

  let output = "";
  let hasDifference = false;

  // 1. فحص الموانئ والأكواد المطلوبة
  let portIssues = checkPortUserCodes(opsRaw);
  const mandatoryCodes = ["G-774", "G-769", "G-801"];
  mandatoryCodes.forEach(c => {
      if(!opsRaw.toUpperCase().includes(c)) portIssues.push(`الكود الإجباري **${c}** مش مكتوب في التقرير!`);
  });

  if(portIssues.length > 0) {
      hasDifference = true;
      output += "<div class='missing'>⚠️ تنبيهات الموانئ والأكواد:</div>";
      portIssues.forEach(msg => output += `• ${msg}<br>`);
      output += "<hr>";
  }

  // 2. فحص الأكواد المكررة والغلط
  const codeIssues = checkCodes(opsRaw);
  const duplicates = findDuplicateCodesBySection(opsRaw);

  if (duplicates.length) {
    hasDifference = true;
    output += "<div class='missing'>⚠ أكواد مكررة بين الأقسام:</div>";
    duplicates.forEach(item => {
      if (item.type === "داخل نفس القسم") output += `الكود: ${item.code} مكرر في ${item.section}<br>`;
      else output += `الكود: ${item.code} موجود في: ${item.sections.join(" و ")}<br>`;
    });
    output += "<hr>";
  }

  if (codeIssues.length) {
    hasDifference = true;
    output += "<div class='missing'>⚠ أكواد غلط (لا تبدأ بـ G):</div>";
    codeIssues.forEach(item => output += `القسم: ${item.section} → الكود: ${item.code}<br>`);
    output += "<hr>";
  }

  // 3. مقارنة الأقسام والأسماء
  const sup = extractSections(clean(supRaw));
  const ops = extractSections(clean(opsRaw));

  const getNorms = obj => new Set(Object.keys(obj || {}));
  const originalsForNorms = (obj, norms) => {
    const outArr = [];
    for (const n of norms) {
      const arr = obj[n] || [];
      for (const x of arr) outArr.push(x);
    }
    return [...new Set(outArr)];
  };

  Object.keys(sup).sort().forEach(id => {
    if (!ops[id]) {
      hasDifference = true;
      output += `<div class='missing'>${formatUser(id)}</div>موجود في الإشراف وغير موجود في العمليات.<br>`;
      output += originalsForNorms(sup[id], Object.keys(sup[id])).join("<br>") + "<hr>";
    }
  });

  Object.keys(ops).sort().forEach(id => {
    if (!sup[id]) {
      hasDifference = true;
      output += `<div class='missing'>${formatUser(id)}</div>موجود في العمليات وغير موجود في الإشراف.<br>`;
      output += originalsForNorms(ops[id], Object.keys(ops[id])).join("<br>") + "<hr>";
    }
  });

  if (!hasDifference) output = "<b>✔ لا يوجد أي اختلاف والتقرير سليم تماماً</b>";
  result.innerHTML = output;
}

/* ===== PROTECT PAGE ===== */
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.ctrlKey && ['u','s','i','j'].includes(e.key.toLowerCase())) e.preventDefault();
});
</script>

</body>
</html>
